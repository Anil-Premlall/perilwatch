  <!-- Scan lines left -->
  <line x1="76" y1="256" x2="136" y2="256" stroke="#f59e0b" stroke-width="24" stroke-linecap="round"/>

  <!-- Scan lines right -->
  <line x1="376" y1="256" x2="436" y2="256" stroke="#f59e0b" stroke-width="24" stroke-linecap="round"/>

  <!-- Top lash lines -->
  <line x1="176" y1="148" x2="192" y2="172" stroke="#f59e0b" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <line x1="256" y1="136" x2="256" y2="164" stroke="#f59e0b" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <line x1="336" y1="148" x2="320" y2="172" stroke="#f59e0b" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
</svg>
