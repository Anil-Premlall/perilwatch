<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Outer eye shape -->
  <ellipse cx="256" cy="256" rx="168" ry="104" stroke="#f59e0b" stroke-width="28" fill="none"/>

  <!-- Iris -->
  <circle cx="256" cy="256" r="68" fill="#f59e0b"/>

  <!-- Pupil -->
