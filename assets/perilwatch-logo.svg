<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="300" rx="0" fill="#0f172a"/>

  <!-- Icon: eye -->
  <!-- Background square -->
  <rect x="40" y="60" width="180" height="180" rx="32" fill="#1e293b"/>

  <!-- Outer eye -->
  <ellipse cx="130" cy="150" rx="62" ry="38" stroke="#f59e0b" stroke-width="10" fill="none"/>

  <!-- Iris -->
  <circle cx="130" cy="150" r="24" fill="#f59e0b"/>

  <!-- Pupil -->
  <circle cx="130" cy="150" r="12" fill="#0f172a"/>

  <!-- Scan lines -->
  <line x1="56" y1="150" x2="80" y2="150" stroke="#f59e0b" stroke-width="9" stroke-linecap="round"/>
  <line x1="180" y1="150" x2="204" y2="150" stroke="#f59e0b" stroke-width="9" stroke-linecap="round"/>

  <!-- Wordmark: PerilWatch -->
  <text
    x="260"
    y="185"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="108"
    font-weight="800"
    letter-spacing="-3"
    fill="#ffffff"
  >Peril<tspan fill="#f59e0b">Watch</tspan></text>
</svg>
